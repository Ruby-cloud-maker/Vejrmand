<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='35' fill='%23f5a623'/><line x1='50' y1='5' x2='50' y2='15' stroke='%23f5a623' stroke-width='6' stroke-linecap='round'/><line x1='50' y1='85' x2='50' y2='95' stroke='%23f5a623' stroke-width='6' stroke-linecap='round'/><line x1='5' y1='50' x2='15' y2='50' stroke='%23f5a623' stroke-width='6' stroke-linecap='round'/><line x1='85' y1='50' x2='95' y2='50' stroke='%23f5a623' stroke-width='6' stroke-linecap='round'/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VejrMand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef6ff;--surface:#fff;--surface2:#dceeff;
  --border:rgba(26,58,107,0.10);--border-md:rgba(26,58,107,0.18);
  --text:#1a3a6b;--text2:#4a6a99;--text3:#8aaaca;
  --blue:#2d6ed6;--blue-bg:#dceeff;--blue-text:#1a3a6b;--blue-border:#a8caef;
  --green:#1a7a4a;--green-bg:#e5f5ec;--green-text:#0f5c35;--green-border:#b8e8cc;
  --amber:#f5a623;--amber-bg:#fff4dc;--amber-text:#7a4e00;
  --sun:#f5a623;--navy:#1a3a6b;
  --r:10px;--rlg:14px;
}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.shell::before{content:'';display:block;height:4px;background:linear-gradient(90deg,#f5a623 0%,#2d6ed6 100%);margin:0 -1.25rem 0;position:relative}

.shell{max-width:700px;margin:0 auto;padding:0 1.25rem 4rem}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 0 1rem;border-bottom:2px solid rgba(245,166,35,0.3);margin-bottom:1.75rem}
.logo{display:flex;align-items:center}
.search-wrap{position:relative;flex:1;max-width:260px}
.search-input{width:100%;height:36px;padding:0 36px 0 12px;border:1px solid var(--border-md);border-radius:20px;background:var(--surface);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--text3)}
.search-btn{position:absolute;right:4px;top:4px;width:28px;height:28px;border:none;background:var(--blue);border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.search-btn:hover{background:#1a56b8}
.autocomplete{position:absolute;top:40px;left:0;right:0;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--r);z-index:100;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08);display:none}
.autocomplete.open{display:block}
.ac-item{padding:10px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--text);transition:background .1s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--surface2)}
.ac-item small{color:var(--text3);font-size:12px;display:block;margin-top:1px}

/* ── State ── */
.state{text-align:center;padding:4rem 0}
.state h2{font-size:17px;font-weight:500;margin-bottom:.4rem}
.state p{font-size:14px;color:var(--text2)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--sun);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Location / title ── */
.loc-line{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);margin-bottom:.3rem}
.page-title{font-size:22px;font-weight:500;letter-spacing:-.4px;margin-bottom:.2rem}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem}

/* ── Section headers ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.sec-title{font-size:11px;font-weight:500;letter-spacing:.6px;text-transform:uppercase;color:var(--text3)}
.sec-badges{display:flex;gap:5px}

/* ── Badges ── */
.badge{font-size:10px;font-weight:500;letter-spacing:.3px;padding:2px 8px;border-radius:20px;border:1px solid}
.b-ec{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border)}
.b-yr{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
.b-avg{background:var(--surface2);color:var(--text2);border-color:var(--border-md)}
.b-agree{background:#e5f5ec;color:#0f5c35;border-color:#b8e8cc}
.b-disagree{background:var(--amber-bg);color:var(--amber-text);border-color:#f5d5a0}

/* ── 7-dages dagskort ── */
.days-scroll{overflow-x:auto;margin-bottom:1.5rem;padding-bottom:4px}
.days-scroll::-webkit-scrollbar{height:4px}
.days-scroll::-webkit-scrollbar-track{background:transparent}
.days-scroll::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:4px}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;min-width:560px}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.7rem .5rem;text-align:center;position:relative}
.day-card.today{border-color:rgba(245,166,35,.5);background:#fff8e8}
.day-name{font-size:11px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;color:var(--text2);margin-bottom:5px}
.day-card.today .day-name{color:#7a4e00}
.day-icon{font-size:22px;display:block;margin-bottom:4px;line-height:1}
.day-tmax{font-size:15px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text)}
.day-tmin{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
.day-precip{font-size:11px;color:var(--text2);margin-top:5px}
/* dual source row inside day card */
.day-sources{display:flex;gap:3px;justify-content:center;margin-top:5px;flex-wrap:wrap}
.day-src{font-size:9px;font-weight:500;padding:1px 5px;border-radius:20px;border:1px solid}
.day-src.ec{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border)}
.day-src.yr{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
.agree-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%}
.agree-dot.yes{background:#1a7a4a}
.agree-dot.no{background:#b35a00}

/* ── Dag-detalje panel ── */
.day-detail{background:var(--surface);border:1px solid var(--blue-border);border-radius:var(--rlg);padding:1rem 1.1rem;margin-bottom:1.25rem;overflow:hidden;max-height:0;opacity:0;transition:max-height .35s ease, opacity .25s ease, padding .25s ease}
.day-detail.open{max-height:400px;opacity:1}
.dd-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.dd-title{font-size:14px;font-weight:500;color:var(--text)}
.dd-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:0 2px;transition:color .15s}
.dd-close:hover{color:var(--text2)}
.dd-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:.9rem}
.dd-stat{background:var(--surface2);border-radius:8px;padding:.55rem .6rem;text-align:center}
.dd-stat-label{font-size:10px;color:var(--text3);letter-spacing:.3px;text-transform:uppercase;margin-bottom:2px}
.dd-stat-val{font-size:15px;font-weight:500;font-family:'DM Mono',monospace;color:var(--text)}
.dd-chart-label{font-size:11px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;color:var(--text3);margin-bottom:.4rem}
#ddCanvas{width:100%;height:80px;display:block}
.dd-sources{display:flex;gap:8px;margin-top:.75rem;flex-wrap:wrap}
.dd-src-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid}

/* ── Ugekort ── */
.weeks-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.85rem .9rem}
.week-label{font-size:11px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem}
.week-icon{font-size:26px;display:block;margin-bottom:.4rem;line-height:1}
.week-trange{font-size:14px;font-family:'DM Mono',monospace;color:var(--text);margin-bottom:2px}
.week-precip{font-size:12px;color:var(--text2);margin-bottom:.6rem}
.week-src-row{display:flex;flex-direction:column;gap:3px}
.week-src{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:3px 7px;border-radius:6px}
.week-src.ec{background:var(--blue-bg);color:var(--blue-text)}
.week-src.yr{background:var(--green-bg);color:var(--green-text)}
.week-src .src-val{font-family:'DM Mono',monospace;font-weight:500}
.week-agree{margin-top:5px;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;display:inline-block;border:1px solid}

/* ── Kurve ── */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:1rem 1.25rem;margin-bottom:1.5rem;overflow:hidden}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.chart-leg{display:flex;gap:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%}
#tempChart{width:100%;height:130px;display:block}

/* ── AI tekstprognose ── */
.forecast-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:1.1rem 1.25rem;margin-bottom:1.5rem}
.forecast-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.forecast-ai-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:500;letter-spacing:.3px;padding:2px 9px;border-radius:20px;background:#fff4dc;color:#7a4e00;border:1px solid #f5d090}
.forecast-text{font-size:15px;line-height:1.75;color:var(--text);min-height:48px}
.forecast-refresh{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;font-family:'DM Sans',sans-serif;padding:2px 6px;border-radius:6px;transition:color .15s}
.forecast-refresh:hover{color:var(--text2)}

/* ── Disclaimer ── */
.disclaimer{font-size:12px;color:var(--text3);line-height:1.65;padding-top:1rem;border-top:1px solid var(--border)}
.disclaimer a{color:var(--text2)}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.a1{animation:fadeUp .3s ease both}
.a2{animation:fadeUp .3s .07s ease both}
.a3{animation:fadeUp .3s .14s ease both}
.a4{animation:fadeUp .3s .21s ease both}
.a5{animation:fadeUp .3s .28s ease both}

@media(max-width:500px){.weeks-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
    <svg width="130" height="36" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg" aria-label="VejrMand logo">
      <circle cx="36" cy="40" r="16" fill="#f5a623"/>
      <line x1="36" y1="16" x2="36" y2="9"  stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="36" y1="64" x2="36" y2="71" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="12" y1="40" x2="5"  y2="40" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="60" y1="40" x2="67" y2="40" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="19" y1="23" x2="13" y2="17" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="53" y1="57" x2="59" y2="63" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="53" y1="23" x2="59" y2="17" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="19" y1="57" x2="13" y2="63" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
      <text x="60" y="35" font-family="DM Sans,sans-serif" font-size="22" font-weight="500" fill="#1a3a6b">Vejr</text>
      <text x="60" y="60" font-family="DM Sans,sans-serif" font-size="22" font-weight="300" fill="#2d6ed6">Mand</text>
    </svg>
  </div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="Søg efter by…" autocomplete="off" aria-label="Søg efter by">
      <button class="search-btn" id="searchBtn" aria-label="Søg">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <div class="autocomplete" id="autocomplete" role="listbox"></div>
    </div>
  </header>
  <div id="app"></div>
</div>

<script>
const app = document.getElementById('app');
const searchInput = document.getElementById('searchInput');
const autocomplete = document.getElementById('autocomplete');
let searchTimeout;

// ── Storage ──
function saveLocation(loc){ localStorage.setItem('vejrm_loc', JSON.stringify(loc)); }
function loadLocation(){ try{ return JSON.parse(localStorage.getItem('vejrm_loc')); }catch{ return null; } }

// ── Search ──
searchInput.addEventListener('input', ()=>{
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if(q.length < 2){ autocomplete.classList.remove('open'); return; }
  searchTimeout = setTimeout(()=>fetchPlaces(q), 300);
});
document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')) autocomplete.classList.remove('open'); });
document.getElementById('searchBtn').addEventListener('click', ()=>{ const q=searchInput.value.trim(); if(q.length>=2) fetchPlaces(q); });
searchInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ const q=searchInput.value.trim(); if(q.length>=2) fetchPlaces(q); }});

async function fetchPlaces(query){
  try{
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=da&format=json`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    showAutocomplete(data.results || []);
  }catch(e){
    autocomplete.innerHTML = `<div class="ac-item" style="color:var(--text3)">Kunne ikke hente resultater</div>`;
    autocomplete.classList.add('open');
  }
}

function showAutocomplete(places){
  if(!places.length){
    autocomplete.innerHTML = `<div class="ac-item" style="color:var(--text3)">Ingen byer fundet</div>`;
    autocomplete.classList.add('open'); return;
  }
  autocomplete.innerHTML = places.map(p=>{
    const name = p.name;
    const region = [p.admin1, p.country].filter(Boolean).join(', ');
    return `<div class="ac-item" data-lat="${p.latitude}" data-lon="${p.longitude}" data-name="${escHtml(name)}" data-region="${escHtml(region)}" role="option" tabindex="0">
      ${escHtml(name)}<small>${escHtml(region)}</small></div>`;
  }).join('');
  autocomplete.classList.add('open');
  autocomplete.querySelectorAll('.ac-item').forEach(el=>{
    el.addEventListener('click', ()=>selectPlace(el));
    el.addEventListener('keydown', e=>{ if(e.key==='Enter') selectPlace(el); });
  });
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function selectPlace(el){
  const loc = { name:el.dataset.name, region:el.dataset.region, lat:parseFloat(el.dataset.lat), lon:parseFloat(el.dataset.lon) };
  autocomplete.classList.remove('open');
  searchInput.value = '';
  saveLocation(loc);
  loadWeather(loc);
}

// ── Loading / empty ──
function showLoading(){
  app.innerHTML = `<div class="state"><div class="spinner"></div><h2>Henter prognose…</h2><p>Trækker data fra ECMWF og Yr.no</p></div>`;
}
function showEmpty(){
  app.innerHTML = `<div class="state">
    <svg width="40" height="40" style="opacity:.25;margin-bottom:1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
    <h2>Vælg en by</h2><p>Søg på et bynavn øverst for at se prognosen</p></div>`;
}

// ── Fetch weather ──
async function loadWeather(loc){
  showLoading();
  try{
    const [ec, yr, clim] = await Promise.all([
      fetchECMWF(loc.lat, loc.lon),
      fetchYr(loc.lat, loc.lon),
      fetchClimate(loc.lat, loc.lon)
    ]);
    render(loc, ec, yr, clim);
  }catch(e){
    app.innerHTML = `<div class="state"><h2>Noget gik galt</h2><p>${e.message||'Prøv igen om lidt'}</p></div>`;
  }
}

async function fetchECMWF(lat, lon){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weathercode&timezone=auto&forecast_days=16`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('ECMWF utilgængelig');
  return res.json();
}

async function fetchYr(lat, lon){
  const url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${lat.toFixed(4)}&lon=${lon.toFixed(4)}`;
  const res = await fetch(url, { headers:{ 'User-Agent':'vejrmaaned/1.0' } });
  if(!res.ok) throw new Error('Yr.no utilgængelig');
  return res.json();
}

async function fetchClimate(lat, lon){
  try{
    const now = new Date();
    const m = now.getMonth()+1;
    const y = now.getFullYear();
    const pad = n => String(n).padStart(2,'0');
    const daysInMonth = new Date(y, m, 0).getDate();
    const start = `${y}-${pad(m)}-01`;
    const end   = `${y}-${pad(m)}-${daysInMonth}`;
    const url = `https://climate-api.open-meteo.com/v1/climate?latitude=${lat}&longitude=${lon}&start_date=${start}&end_date=${end}&models=CMIP6&daily=temperature_2m_mean,precipitation_sum`;
    const res = await fetch(url);
    if(!res.ok) return null;
    return res.json();
  }catch{ return null; }
}

// ── Process Yr into daily ──
function yrToDailyMap(yrData){
  const ts = yrData.properties.timeseries;
  const daily = {};
  ts.forEach(entry=>{
    const date = entry.time.slice(0,10);
    if(!daily[date]) daily[date]={ temps:[], precip:0, symbols:[] };
    const t = entry.data.instant.details.air_temperature;
    if(t != null) daily[date].temps.push(t);
    const n1 = entry.data.next_1_hours;
    if(n1){
      daily[date].precip += n1.details.precipitation_amount||0;
      if(n1.summary.symbol_code) daily[date].symbols.push(n1.summary.symbol_code);
    }
  });
  const result = {};
  Object.entries(daily).slice(0,10).forEach(([date,d])=>{
    result[date] = {
      tmax: d.temps.length ? Math.max(...d.temps) : null,
      tmin: d.temps.length ? Math.min(...d.temps) : null,
      tmean: d.temps.length ? d.temps.reduce((a,b)=>a+b,0)/d.temps.length : null,
      precip: d.precip,
      symbol: d.symbols[Math.floor(d.symbols.length/2)]||'cloudy'
    };
  });
  return result;
}

// ── Yr timeseries per dag ──
function yrToHourlyMap(yrData){
  const ts = yrData.properties.timeseries;
  const map = {};
  ts.forEach(entry=>{
    const date = entry.time.slice(0,10);
    const hour = parseInt(entry.time.slice(11,13));
    if(!map[date]) map[date]=[];
    const det = entry.data.instant.details;
    const n1 = entry.data.next_1_hours;
    map[date].push({
      hour,
      temp: det.air_temperature??null,
      wind: det.wind_speed??null,
      humid: det.relative_humidity??null,
      precip: n1?.details?.precipitation_amount??0,
      feels: det.air_temperature!=null&&det.wind_speed!=null
        ? Math.round(det.air_temperature - 0.33*det.wind_speed) : null
    });
  });
  return map;
}

// ── Icons ──
function wmoIcon(c){
  if(c===0) return '☀️';
  if(c<=2) return '🌤';
  if(c===3) return '☁️';
  if(c<=49) return '🌫';
  if(c<=59) return '🌧';
  if(c<=69) return '❄️';
  if(c<=79) return '🌨';
  if(c<=84) return '🌧';
  if(c<=99) return '⛈';
  return '🌡';
}
function yrIcon(s){
  if(!s) return '🌡';
  if(s.includes('clearsky')) return '☀️';
  if(s.includes('fair')) return '🌤';
  if(s.includes('partlycloudy')) return '⛅';
  if(s.includes('cloudy')) return '☁️';
  if(s.includes('thunder')) return '⛈';
  if(s.includes('snow')) return '❄️';
  if(s.includes('sleet')) return '🌨';
  if(s.includes('rain')) return '🌧';
  if(s.includes('fog')) return '🌫';
  return '☁️';
}

function dayName(dateStr, short=false){
  const d = new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('da-DK',{weekday:short?'short':'long'});
}
function fmt1(n){ return n!=null ? n.toFixed(1) : '–'; }
function fmtR(n){ return n!=null ? Math.round(n)+'°' : '–'; }
function agree(a,b,threshold){ return (a!=null&&b!=null) ? Math.abs(a-b)<=threshold : null; }

const MONTHS = ['januar','februar','marts','april','maj','juni','juli','august','september','oktober','november','december'];

// ── Regelbaseret tekstprognose ──
function generateForecast(data){
  const el = document.getElementById('forecastText');
  if(!el) return;

  const sætninger = [];

  // ── Sætning 1: De næste 2-3 dage ──
  const første3 = data.sevenDays.slice(0,3);
  const meanMax = Math.round(første3.reduce((s,d)=>s+d.tmax,0)/første3.length);
  const meanMin = Math.round(første3.reduce((s,d)=>s+d.tmin,0)/første3.length);
  const totalNedbør = første3.reduce((s,d)=>s+d.nedbor_mm,0);
  const regnDage = første3.filter(d=>d.nedbor_mm>1).length;

  let vejrkarakter = '';
  // Brug vejrkode fra midterdagen
  const midKode = data.sevenDays[1]?.vejrkode ?? 3;
  if(midKode===0) vejrkarakter = 'solrigt og klart';
  else if(midKode<=2) vejrkarakter = 'overvejende solrigt';
  else if(midKode===3) vejrkarakter = 'skyet';
  else if(midKode<=49) vejrkarakter = 'tåget';
  else if(midKode<=59) vejrkarakter = 'med let regn';
  else if(midKode<=69) vejrkarakter = 'med nedbør';
  else if(midKode<=79) vejrkarakter = 'med sne eller slud';
  else if(midKode<=84) vejrkarakter = 'med byger';
  else vejrkarakter = 'med tordenvejr';

  let s1 = `De næste dage bliver ${vejrkarakter} med temperaturer mellem ${meanMin} og ${meanMax} grader.`;
  if(regnDage===0 && totalNedbør<1) s1 = s1.replace('.', ' og stort set ingen nedbør.');
  else if(regnDage>=2) s1 += ` Der ventes nedbør på ${Math.round(totalNedbør)} mm fordelt over ${regnDage} dage.`;
  sætninger.push(s1);

  // ── Sætning 2: Resten af uge 1 (dag 4–7) ──
  const resten = data.sevenDays.slice(3,7);
  if(resten.length){
    const restMax = Math.round(resten.reduce((s,d)=>s+d.tmax,0)/resten.length);
    const restNedbør = resten.reduce((s,d)=>s+d.nedbor_mm,0);
    const restRegnDage = resten.filter(d=>d.nedbor_mm>1).length;
    let s2 = `Hen mod ugens slutning ventes ${restMax} grader`;
    if(restRegnDage===0) s2 += ' med tørt vejr.';
    else if(restNedbør<5) s2 += ' med spredte byger.';
    else s2 += ` og ${Math.round(restNedbør)} mm nedbør over ${restRegnDage} dage.`;
    sætninger.push(s2);
  }

  // ── Sætning 3: Langtidsprognose ──
  if(data.uger.length>=2){
    const uge2 = data.uger[1];
    const uge3 = data.uger[2];
    const tempNorm = data.klimanormal_temp;
    const månedsMean = data.uger.reduce((s,u)=>s+u.ec_mean,0)/data.uger.length;
    const månedsPrecip = data.uger.reduce((s,u)=>s+u.ec_precip,0);

    let tempVurdering = '';
    if(tempNorm!=null){
      const diff = månedsMean - tempNorm;
      if(diff>2) tempVurdering = 'markant varmere end normalt for årstiden';
      else if(diff>0.5) tempVurdering = 'lidt varmere end normalt';
      else if(diff<-2) tempVurdering = 'markant koldere end normalt';
      else if(diff<-0.5) tempVurdering = 'lidt koldere end normalt';
      else tempVurdering = 'tæt på det normale for årstiden';
    } else {
      tempVurdering = `omkring ${Math.round(månedsMean)} grader i gennemsnit`;
    }

    let s3 = `Resten af måneden tegner til at blive ${tempVurdering}`;
    if(månedsPrecip < 20) s3 += ' med relativt lidt nedbør.';
    else if(månedsPrecip > 60) s3 += ' og noget regnfuldt.';
    else s3 += '.';
    sætninger.push(s3);

    // ── Sætning 4: Usikkerhed/kildeforskelle ──
    const uenige = data.uger.filter(u=>u.enige===false);
    if(uenige.length>0){
      const uperioder = uenige.map(u=>`uge ${u.uge}`).join(' og ');
      sætninger.push(`Der er en vis usikkerhed i prognosen for ${uperioder}, hvor de to datakilder ikke er enige — tag langtidsprognosen med forbehold.`);
    } else if(data.uger.some(u=>u.yr_mean!=null)){
      sætninger.push('De to datakilder er overordnet enige om billedet, hvilket giver en vis tillid til prognosen.');
    }
  }

  el.innerHTML = escHtml(sætninger.join(' '));
  el.classList.add('done');
}

// ── Canvas chart ──
function drawChart(temps, dates, normTemp){
  const canvas = document.getElementById('tempChart');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const w = canvas.offsetWidth;
  const h = 130;
  canvas.width = w*dpr; canvas.height = h*dpr;
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  ctx.scale(dpr, dpr);

  const pad = {top:12,right:12,bottom:26,left:30};
  const cw = w-pad.left-pad.right;
  const ch = h-pad.top-pad.bottom;
  const valid = temps.filter(v=>v!=null);
  if(!valid.length) return;
  const allV = [...valid]; if(normTemp!=null) allV.push(normTemp);
  const minV = Math.min(...allV)-2;
  const maxV = Math.max(...allV)+2;
  const xs = i => pad.left+(i/(temps.length-1))*cw;
  const ys = v => pad.top+ch-((v-minV)/(maxV-minV))*ch;

  // grid
  ctx.strokeStyle='rgba(0,0,0,0.05)'; ctx.lineWidth=1;
  [0,.33,.66,1].forEach(t=>{ const y=pad.top+t*ch; ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cw,y); ctx.stroke(); });

  // week dividers
  ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  [7,14].forEach(i=>{ if(i<temps.length){ const x=xs(i); ctx.beginPath(); ctx.moveTo(x,pad.top); ctx.lineTo(x,pad.top+ch); ctx.stroke(); } });
  ctx.setLineDash([]);

  // normal line
  if(normTemp!=null){
    const ny=ys(normTemp);
    ctx.strokeStyle='rgba(158,158,151,.45)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(pad.left,ny); ctx.lineTo(pad.left+cw,ny); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(120,120,110,.6)'; ctx.font='9px DM Mono,monospace'; ctx.textAlign='left';
    ctx.fillText('norm',pad.left+2,ny-3);
  }

  // fill
  ctx.beginPath();
  temps.forEach((v,i)=>{ if(v==null) return; i===0||temps.slice(0,i).every(x=>x==null)?ctx.moveTo(xs(i),ys(v)):ctx.lineTo(xs(i),ys(v)); });
  ctx.lineTo(xs(temps.length-1),pad.top+ch); ctx.lineTo(xs(0),pad.top+ch); ctx.closePath();
  ctx.fillStyle='rgba(45,110,214,.07)'; ctx.fill();

  // line
  ctx.beginPath(); ctx.strokeStyle='#2d6ed6'; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.lineCap='round';
  let first=true;
  temps.forEach((v,i)=>{ if(v==null) return; if(first){ctx.moveTo(xs(i),ys(v));first=false;}else ctx.lineTo(xs(i),ys(v)); });
  ctx.stroke();

  // week boundary dots
  [0,6,13,temps.length-1].forEach(i=>{ if(i<temps.length&&temps[i]!=null){ ctx.beginPath(); ctx.arc(xs(i),ys(temps[i]),3,0,Math.PI*2); ctx.fillStyle='#2d6ed6'; ctx.fill(); } });

  // Y labels
  ctx.fillStyle='rgba(100,100,95,.7)'; ctx.font='10px DM Mono,monospace'; ctx.textAlign='right';
  [Math.round(minV+1),Math.round((minV+maxV)/2),Math.round(maxV-1)].forEach(v=>{ ctx.fillText(v+'°',pad.left-4,ys(v)+3); });

  // X labels (dates at week marks)
  ctx.textAlign='center'; ctx.font='10px DM Sans,sans-serif';
  [0,7,13].filter(i=>i<dates.length).forEach(i=>{
    const d=new Date(dates[i]+'T12:00:00');
    ctx.fillText(d.toLocaleDateString('da-DK',{day:'numeric',month:'short'}),xs(i),h-6);
  });
}

      <div class="dd-stat">
        <div class="dd-stat-label">ECMWF</div>
        <div class="dd-stat-val">${ec.tmean!=null?fmt1(ec.tmean)+'°':'–'}</div>
      </div>
      <div class="dd-stat">
        <div class="dd-stat-label">Yr.no</div>
        <div class="dd-stat-val">${yr&&yr.tmean!=null?fmt1(yr.tmean)+'°':'–'}</div>
      </div>
    </div>
    ${hours.length>2?`<div class="dd-chart-label">Temperatur time for time (Yr.no)</div><canvas id="ddCanvas" aria-label="Timetemperatur"></canvas>`:''}
    <div class="dd-sources">${agreeBadge}</div>`;

  el.classList.add('open');
  el.querySelector('.dd-close').addEventListener('click',()=>{
    el.classList.remove('open');
  });

  if(hours.length>2){
    requestAnimationFrame(()=>drawDetailChart(hours));
  }
}

function drawDetailChart(hours){
  const canvas = document.getElementById('ddCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const w = canvas.offsetWidth;
  const h = 80;
  canvas.width = w*dpr; canvas.height = h*dpr;
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  ctx.scale(dpr, dpr);

  const temps = hours.filter(h=>h.temp!=null);
  if(temps.length<2) return;
  const precips = hours.map(h=>h.precip);
  const maxPrecip = Math.max(...precips, 0.1);

  const pad = {top:8, right:8, bottom:22, left:28};
  const cw = w-pad.left-pad.right;
  const ch = h-pad.top-pad.bottom;
  const tVals = temps.map(h=>h.temp);
  const minT = Math.min(...tVals)-1;
  const maxT = Math.max(...tVals)+1;

  const xs = i => pad.left+(i/(hours.length-1))*cw;
  const yt = v => pad.top+ch-((v-minT)/(maxT-minT))*ch;

  // Nedbørssøjler
  hours.forEach((h,i)=>{
    if(!h.precip) return;
    const bh = (h.precip/maxPrecip)*(ch*0.35);
    const x = xs(i);
    ctx.fillStyle='rgba(45,110,214,0.2)';
    ctx.fillRect(x-3, pad.top+ch-bh, 6, bh);
  });

  // Temperatur fill
  ctx.beginPath();
  let firstDrawn = true;
  hours.forEach((h,i)=>{ if(h.temp==null) return; firstDrawn?(ctx.moveTo(xs(i),yt(h.temp)),firstDrawn=false):ctx.lineTo(xs(i),yt(h.temp)); });
  ctx.lineTo(xs(hours.length-1),pad.top+ch); ctx.lineTo(xs(0),pad.top+ch);
  ctx.closePath(); ctx.fillStyle='rgba(45,110,214,0.07)'; ctx.fill();

  // Temperatur linje
  ctx.beginPath();
  ctx.strokeStyle='#2d6ed6'; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.lineCap='round';
  let fl=true;
  hours.forEach((h,i)=>{ if(h.temp==null) return; fl?(ctx.moveTo(xs(i),yt(h.temp)),fl=false):ctx.lineTo(xs(i),yt(h.temp)); });
  ctx.stroke();

  // Y labels
  ctx.fillStyle='rgba(74,106,153,0.7)'; ctx.font='9px DM Mono,monospace'; ctx.textAlign='right';
  [Math.round(minT+0.5), Math.round(maxT-0.5)].forEach(v=>ctx.fillText(v+'°',pad.left-3,yt(v)+3));

  // X labels – vis hver 6. time
  ctx.textAlign='center'; ctx.font='9px DM Sans,sans-serif'; ctx.fillStyle='rgba(74,106,153,0.6)';
  hours.forEach((h,i)=>{ if(h.hour%6===0) ctx.fillText(h.hour+'h', xs(i), h-6); });
}

// ── Init ──
const saved = loadLocation();
if(saved){ searchInput.placeholder=saved.name; loadWeather(saved); }
else showEmpty();
</script>
